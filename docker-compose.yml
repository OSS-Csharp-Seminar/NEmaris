services:
  db:
    image: mysql:8.0
    container_name: nemaris_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: NEmaris
      MYSQL_USER: ${MYSQL_USER:-nemaris_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nemaris_pass}
    ports:
      - "3307:3306"
    volumes:
      - nemaris_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  nemaris_data: